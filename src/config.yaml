data_path: data/demo_slope_load_data.csv
window_size: 10

# Model architecture
model_type: gru
hidden_dim: 320
num_layers: 2
dropout: 0.2

# Training
batch_size: 512
epochs: 100
learning_rate: 0.001
weight_decay: 0.0001

# Logging / checkpointing
output_dir: models/world_model
patience: 15
val_frac: 0.1
save_every: 1
